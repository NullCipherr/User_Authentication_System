{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<section class="card">
  <h2>Login</h2>
  <form method="post" class="form-grid">
    <label>Username
      <input type="text" name="username" required>
    </label>
    <label>Senha
      <input type="password" name="password" required>
    </label>
    <button type="submit" class="btn">Entrar</button>
  </form>
</section>
{% endblock %}
